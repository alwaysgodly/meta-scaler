name: supply-chain-env
version: "1.0.0"
description: >
  A real-world supply chain restocking environment for RL agents.
  The agent manages inventory across warehouses, deciding what to order,
  how much, and from which supplier — balancing cost, stockout risk,
  and supplier lead times.

author: Pushkraj
license: MIT

tasks:
  - id: easy
    difficulty: easy
    description: "Single warehouse, 1 product, stable demand. Learn basic restocking."
    max_steps: 20
    target_score: 0.7
    grader_entrypoint: "supply_chain_env.tasks.graders:grade_easy"

  - id: medium
    difficulty: medium
    description: "Single warehouse, 5 products, seasonal demand fluctuation."
    max_steps: 40
    target_score: 0.5
    grader_entrypoint: "supply_chain_env.tasks.graders:grade_medium"

  - id: hard
    difficulty: hard
    description: "3 warehouses, 10 products, noisy seasonal demand + random supplier delays."
    max_steps: 60
    target_score: 0.35
    grader_entrypoint: "supply_chain_env.tasks.graders:grade_hard"

action_space:
  type: structured
  description: >
    A list of OrderItem objects, each containing product_id, quantity, and supplier_id.

observation_space:
  type: structured
  fields:
    - name: inventory
      type: "List[List[float]]"
    - name: in_transit
      type: "List[List[float]]"
    - name: demand_forecast
      type: "List[List[float]]"
    - name: supplier_prices
      type: "List[List[float]]"
    - name: supplier_lead_times
      type: "List[List[int]]"
    - name: stockouts
      type: "List[List[float]]"
    - name: step_cost
      type: float
    - name: reward
      type: float
    - name: done
      type: bool

reward:
  range: [-1.0, 1.0]
  description: "service_level * 0.9 - stockout_severity * 0.5 - holding_penalty - 0.05"

environment:
  # Adjusted to match your "supply_chain_env" folder name
  env_class: "supply_chain_env.env:SupplyChainEnv"
  server_module: "supply_chain_env.server"
  server_app: "app"
  port: 8000

docker:
  base_image: python:3.11-slim
  port: 8000

baseline:
  # Matches the inference.py file I see in your root directory
  script: "inference.py"
  agent: "Greedy Restock (safety_factor=1.5)"
  scores:
    easy: 0.568
    medium: 0.421
    hard: 0.345
